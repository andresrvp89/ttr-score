<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Contatore Ticket to Ride</title>
<style>
body { font-family: Arial; padding: 15px; background:#f5f5f5; }
.card { background:white; padding:12px; border-radius:10px; margin-bottom:12px; }
input { width:100%; padding:8px; margin:4px 0; }
button { width:100%; padding:10px; margin-top:6px; border:none; background:#4CAF50; color:white; border-radius:8px; font-size:14px; }
.small-btn { width:auto; padding:6px 10px; margin:4px 0; }
.section-title { font-weight:bold; margin-top:8px; }
.winner { border:2px solid gold; }
.breakdown { font-size:12px; color:#555; margin-top:4px; }
</style>
</head>
<body><h2>🚆 Contatore Ticket to Ride (Europa)</h2><div id="players"></div><button onclick="addPlayer()">➕ Aggiungi Giocatore</button> <button onclick="removePlayer()">➖ Rimuovi Ultimo Giocatore</button>

<div class="card">
<h3>🏆 Percorso Più Lungo</h3>
<input id="longest" placeholder="Nome giocatore">
</div><button onclick="calculate()">🧮 Calcola Punteggi</button>

<h3 id="results"></h3><script>
let playerCount = 0;

function addObjective(player, type) {
  const container = document.getElementById(`${type}_container_${player}`);
  const input = document.createElement('input');
  input.type = 'number';
  input.placeholder = type === 'done' ? 'Obiettivo completato' : 'Obiettivo non completato';
  container.appendChild(input);
}

function addPlayer(name="") {
  playerCount++;
  const div = document.createElement('div');
  div.className = 'card';
  div.id = `player${playerCount}`;
  div.innerHTML = `
    <h3>Giocatore ${playerCount}</h3>
    <input placeholder="Nome" id="name${playerCount}" value="${name}">

    <div class="section-title">🎯 Obiettivi Completati</div>
    <div id="done_container_${playerCount}"></div>
    <button class="small-btn" onclick="addObjective(${playerCount}, 'done')">➕ Aggiungi</button>

    <div class="section-title">❌ Obiettivi Non Completati</div>
    <div id="fail_container_${playerCount}"></div>
    <button class="small-btn" onclick="addObjective(${playerCount}, 'fail')">➕ Aggiungi</button>

    <div class="section-title">🚧 Tratte Costruite</div>
    <input type="number" placeholder="Lunghezza 1" id="r1_${playerCount}">
    <input type="number" placeholder="Lunghezza 2" id="r2_${playerCount}">
    <input type="number" placeholder="Lunghezza 3" id="r3_${playerCount}">
    <input type="number" placeholder="Lunghezza 4" id="r4_${playerCount}">
    <input type="number" placeholder="Lunghezza 6" id="r6_${playerCount}">
    <input type="number" placeholder="Lunghezza 8" id="r8_${playerCount}">

    <div class="section-title">🏠 Stazioni Usate</div>
    <input type="number" placeholder="0–3" id="stations_${playerCount}">
  `;
  document.getElementById('players').appendChild(div);
}

function removePlayer() {
  if (playerCount > 0) {
    document.getElementById(`player${playerCount}`).remove();
    playerCount--;
  }
}

function routeScore(len, count) {
  const points = {1:1,2:2,3:4,4:7,6:15,8:21};
  return (points[len] || 0) * count;
}

function sumInputs(containerId) {
  let total = 0;
  const inputs = document.getElementById(containerId).querySelectorAll('input');
  inputs.forEach(i => total += parseInt(i.value) || 0);
  return total;
}

function calculate() {
  let scores = [];
  const longest = document.getElementById('longest').value;

  for (let i = 1; i <= playerCount; i++) {
    const name = document.getElementById(`name${i}`).value || `Giocatore ${i}`;

    let done = sumInputs(`done_container_${i}`);
    let failed = sumInputs(`fail_container_${i}`);
    let objectives = done - failed;

    const r1 = parseInt(document.getElementById(`r1_${i}`).value) || 0;
    const r2 = parseInt(document.getElementById(`r2_${i}`).value) || 0;
    const r3 = parseInt(document.getElementById(`r3_${i}`).value) || 0;
    const r4 = parseInt(document.getElementById(`r4_${i}`).value) || 0;
    const r6 = parseInt(document.getElementById(`r6_${i}`).value) || 0;
    const r8 = parseInt(document.getElementById(`r8_${i}`).value) || 0;

    let routeTotal = routeScore(1,r1)+routeScore(2,r2)+routeScore(3,r3)+routeScore(4,r4)+routeScore(6,r6)+routeScore(8,r8);

    let bonus = (name === longest) ? 10 : 0;

    let used = parseInt(document.getElementById(`stations_${i}`).value) || 0;
    if (used > 3) used = 3;
    let unused = 3 - used;
    let stationBonus = unused * 4;

    let total = objectives + routeTotal + bonus + stationBonus;

    scores.push({name,total,id:i,objectives,routeTotal,bonus,stationBonus});
  }

  let max = Math.max(...scores.map(s => s.total));

  let results = '';
  scores.forEach(s => {
    let isWinner = s.total === max;
    let playerDiv = document.getElementById(`player${s.id}`);
    playerDiv.classList.toggle('winner', isWinner);

    results += `${isWinner ? '🏆 ' : ''}${s.name}: ${s.total} punti`;
    results += `<div class="breakdown">`;
    results += `Obiettivi: ${s.objectives} | Tratte: ${s.routeTotal} | Percorso lungo: ${s.bonus} | Stazioni: ${s.stationBonus}`;
    results += `</div>`;
    results += `<br>`;
  });

  document.getElementById('results').innerHTML = results;

  localStorage.setItem('players', JSON.stringify(scores.map(s => s.name)));
}

window.onload = () => {
  const saved = JSON.parse(localStorage.getItem('players') || '[]');
  if (saved.length) {
    saved.forEach(name => addPlayer(name));
  } else {
    addPlayer();
    addPlayer();
  }
};
</script></body>
</html>
